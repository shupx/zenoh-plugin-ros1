name: nightly-build-spx

on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: nightly-build-spx
  cancel-in-progress: false

jobs:
  check-changes:
    name: Check nightly source changes
    runs-on: ubuntu-24.04
    outputs:
      should_build: ${{ steps.release-check.outputs.should_build }}
      build_date: ${{ steps.meta.outputs.build_date }}
      build_seq: ${{ steps.meta.outputs.build_seq }}
      head_sha: ${{ steps.meta.outputs.head_sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Compute build metadata
        id: meta
        shell: bash
        run: |
          echo "build_date=$(date -u +%Y%m%d)" >> "$GITHUB_OUTPUT"
          echo "build_seq=${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "head_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Compare against latest successful nightly run
        id: release-check
        uses: actions/github-script@v7
        env:
          HEAD_SHA: ${{ steps.meta.outputs.head_sha }}
        with:
          script: |
            let shouldBuild = true;
            const workflowId = '.github/workflows/nightly-build-spx.yml';

            try {
              const { data } = await github.rest.actions.listWorkflowRuns({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: workflowId,
                branch: context.ref.replace('refs/heads/', ''),
                status: 'success',
                per_page: 10,
              });

              const currentRunId = Number(process.env.GITHUB_RUN_ID || '0');
              const previousSuccessfulRun = (data.workflow_runs || []).find(
                (run) => run.id !== currentRunId
              );
              const lastSha = previousSuccessfulRun?.head_sha || '';

              core.info(`Current HEAD: ${process.env.HEAD_SHA}`);
              core.info(`Previous successful nightly SHA: ${lastSha || 'not found'}`);

              if (lastSha === process.env.HEAD_SHA) {
                shouldBuild = false;
              }
            } catch (error) {
              core.warning(`Unable to inspect prior nightly runs: ${error.message}`);
            }

            core.setOutput('should_build', shouldBuild ? 'true' : 'false');

      - name: Write summary
        shell: bash
        run: |
          {
            echo "## Nightly build decision"
            echo
            echo "- HEAD SHA: \`${{ steps.meta.outputs.head_sha }}\`"
            echo "- Should build: \`${{ steps.release-check.outputs.should_build }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  build:
    name: Build ${{ matrix.platform_id }}
    needs: check-changes
    if: needs.check-changes.outputs.should_build == 'true'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
            platform_id: linux-amd64
          - arch: arm64
            runner: ubuntu-24.04-arm
            platform_id: linux-arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Pull build image
        run: docker pull shupeixuan/zenoh-plugin-ros1-build:latest

      - name: Clean previous dist
        run: rm -rf "dist/${{ matrix.platform_id }}"

      - name: Build inside container
        shell: bash
        run: |
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/workspace" \
            -w /workspace \
            -e CI=true \
            -e BUILD_DATE="${{ needs.check-changes.outputs.build_date }}" \
            -e BUILD_SEQ="${{ needs.check-changes.outputs.build_seq }}" \
            -e HEAD_SHA="${{ needs.check-changes.outputs.head_sha }}" \
            -e PLATFORM_ID="${{ matrix.platform_id }}" \
            -e CARGO_TARGET_DIR=/opt/zenoh-plugin-ros1/target \
            shupeixuan/zenoh-plugin-ros1-build:latest \
            bash -lc '
              set -euo pipefail

              git config --global --add safe.directory /workspace
              cargo build --release --locked -p zenoh-bridge-ros1 -p zenoh-plugin-ros1

              out_dir="dist/${PLATFORM_ID}"
              rm -rf "${out_dir}"
              mkdir -p "${out_dir}"

              cp "${CARGO_TARGET_DIR}/release/zenoh-bridge-ros1" "${out_dir}/zenoh-bridge-ros1-${PLATFORM_ID}"
              cp "${CARGO_TARGET_DIR}/release/libzenoh_plugin_ros1.so" "${out_dir}/libzenoh_plugin_ros1-${PLATFORM_ID}.so"
              chmod +x "${out_dir}/zenoh-bridge-ros1-${PLATFORM_ID}"

              {
                echo "commit=${HEAD_SHA}"
                echo "build_date=${BUILD_DATE}"
                echo "build_seq=${BUILD_SEQ}"
                echo "platform=${PLATFORM_ID}"
              } > "${out_dir}/BUILD_INFO-${PLATFORM_ID}.txt"
            '

      - name: Verify artifacts
        shell: bash
        run: |
          set -euo pipefail

          test -x "dist/${{ matrix.platform_id }}/zenoh-bridge-ros1-${{ matrix.platform_id }}"
          test -r "dist/${{ matrix.platform_id }}/libzenoh_plugin_ros1-${{ matrix.platform_id }}.so"
          test -r "dist/${{ matrix.platform_id }}/BUILD_INFO-${{ matrix.platform_id }}.txt"
          find "dist/${{ matrix.platform_id }}" -maxdepth 1 -type f | sort

      - name: Upload nightly artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nightly-${{ matrix.platform_id }}
          path: dist/${{ matrix.platform_id }}/*
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish nightly release
    needs:
      - check-changes
      - build
    if: needs.check-changes.outputs.should_build == 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: Download built artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Show artifact list
        shell: bash
        run: find release-artifacts -type f | sort

      - name: Prepare release assets
        shell: bash
        run: |
          set -euo pipefail

          src_root="release-artifacts"
          out_root="release-upload"
          rm -rf "${out_root}"
          mkdir -p "${out_root}"

          while IFS= read -r file; do
            cp "${file}" "${out_root}/$(basename "${file}")"
          done < <(find "${src_root}" -type f | sort)

          find "${out_root}" -type f | sort

      - name: Remove existing nightly assets
        uses: actions/github-script@v7
        with:
          script: |
            try {
              const { data: release } = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag: 'nightly',
              });

              for (const asset of release.assets) {
                core.info(`Deleting asset ${asset.name} (${asset.id})`);
                await github.rest.repos.deleteReleaseAsset({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  asset_id: asset.id,
                });
              }
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
            }

      - name: Move nightly tag to current commit
        uses: actions/github-script@v7
        env:
          HEAD_SHA: ${{ needs.check-changes.outputs.head_sha }}
        with:
          script: |
            try {
              await github.rest.git.updateRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: 'tags/nightly',
                sha: process.env.HEAD_SHA,
                force: true,
              });
              core.info(`Updated tag nightly to ${process.env.HEAD_SHA}`);
            } catch (error) {
              if (
                error.status === 404 ||
                (error.status === 422 && /Reference does not exist/i.test(error.message || ''))
              ) {
                await github.rest.git.createRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: 'refs/tags/nightly',
                  sha: process.env.HEAD_SHA,
                });
                core.info(`Created tag nightly at ${process.env.HEAD_SHA}`);
              } else {
                throw error;
              }
            }

      - name: Publish nightly release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: Nightly Build
          prerelease: false
          make_latest: true
          target_commitish: ${{ needs.check-changes.outputs.head_sha }}
          body: |
            Automated nightly build for commit `${{ needs.check-changes.outputs.head_sha }}`.

            Build date: `${{ needs.check-changes.outputs.build_date }}`
            Build sequence: `${{ needs.check-changes.outputs.build_seq }}`

            <!-- nightly-source-sha: ${{ needs.check-changes.outputs.head_sha }} -->
          files: |
            release-upload/*
          overwrite_files: true
